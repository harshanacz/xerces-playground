<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xerces-wasm Playground — Browser XSD &amp; XML Schema Validator</title>
    <meta
      name="description"
      content="Validate XSD schemas and XML documents entirely in your browser via WebAssembly. Multi-file schema projects, drag-and-drop, real-time diagnostics — no server, no upload, powered by Apache Xerces-C++."
    />
    <link rel="canonical" href="https://harshanacz.github.io/xerces-playground/" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f1115" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="xerces-wasm Playground" />
    <meta property="og:title" content="xerces-wasm Playground — Browser XSD &amp; XML Schema Validator" />
    <meta
      property="og:description"
      content="Validate XSD schemas and XML documents entirely in your browser via WebAssembly. Multi-file schema projects, drag-and-drop, real-time diagnostics — no server, no upload."
    />
    <meta property="og:url" content="https://harshanacz.github.io/xerces-playground/" />
    <meta property="og:image" content="https://harshanacz.github.io/xerces-playground/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="xerces-wasm Playground — Browser XSD &amp; XML Schema Validator" />
    <meta
      name="twitter:description"
      content="Validate XSD schemas and XML documents entirely in your browser via WebAssembly. No server, no upload."
    />
    <meta name="twitter:image" content="https://harshanacz.github.io/xerces-playground/og-image.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "xerces-wasm Playground",
        "url": "https://harshanacz.github.io/xerces-playground/",
        "description": "Validate XSD schemas and XML documents entirely in your browser via WebAssembly. Multi-file schema projects, drag-and-drop, real-time diagnostics — no server, no upload.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any (runs in any modern browser)",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>xerces-wasm playground</h1>
        <p>
          Paste an XSD and an XML document, then validate — entirely in your
          browser via WebAssembly. No server, no upload.
          <a href="https://www.npmjs.com/package/xerces-wasm" target="_blank" rel="noopener">npm</a>
          ·
          <a href="https://github.com/harshanacz/xerces-wasm-validator" target="_blank" rel="noopener">GitHub</a>
        </p>
      </header>

      <main>
        <section class="editor">
          <div class="editor-header">
            <label>XSD schema files</label>
          </div>
          <div class="xsd-tabs" id="xsd-tabs"></div>
          <div class="dropzone" id="xsd-dropzone">
            <span>Drop .xsd files here or click to browse</span>
            <input type="file" id="xsd-file-input" accept=".xsd" multiple hidden />
          </div>
          <div class="editor-host" id="xsd-editor-host"></div>
          <div class="xsd-status" id="xsd-status"></div>
        </section>

        <section class="editor">
          <div class="editor-header">
            <label>XML document</label>
          </div>
          <div class="xsd-tabs">
            <span class="file-chip" id="xml-file-chip">document.xml</span>
          </div>
          <div class="dropzone" id="xml-dropzone">
            <span>Drop .xml file here or click to browse</span>
            <input type="file" id="xml-file-input" accept=".xml" hidden />
          </div>
          <div class="editor-host" id="xml-editor-host"></div>
          <div class="xsd-status" id="xml-status"></div>
        </section>
      </main>
    </div>

    <div class="bottom-dock">
      <div class="dock-inner">
        <div class="dock-bar">
          <button id="validate-btn">Validate manually</button>
          <span id="status"></span>
          <span class="dock-title">PROBLEMS</span>
        </div>
        <section class="results" id="results" aria-live="polite"></section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
