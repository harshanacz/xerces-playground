<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xerces-wasm playground</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>xerces-wasm playground</h1>
        <p>
          Paste an XSD and an XML document, then validate — entirely in your
          browser via WebAssembly. No server, no upload.
          <a href="https://www.npmjs.com/package/xerces-wasm" target="_blank" rel="noopener">npm</a>
          ·
          <a href="https://github.com/harshanacz/xerces-wasm-validator" target="_blank" rel="noopener">GitHub</a>
        </p>
      </header>

      <main>
        <section class="editor">
          <div class="editor-header">
            <label>XSD schema files</label>
          </div>
          <div class="xsd-tabs" id="xsd-tabs"></div>
          <div class="dropzone" id="xsd-dropzone">
            <span>Drop .xsd files here or click to browse</span>
            <input type="file" id="xsd-file-input" accept=".xsd" multiple hidden />
          </div>
          <div class="editor-host" id="xsd-editor-host"></div>
          <div class="xsd-status" id="xsd-status"></div>
        </section>

        <section class="editor">
          <div class="editor-header">
            <label>XML document</label>
          </div>
          <div class="xsd-tabs">
            <span class="file-chip" id="xml-file-chip">document.xml</span>
          </div>
          <div class="dropzone" id="xml-dropzone">
            <span>Drop .xml file here or click to browse</span>
            <input type="file" id="xml-file-input" accept=".xml" hidden />
          </div>
          <div class="editor-host" id="xml-editor-host"></div>
          <div class="xsd-status" id="xml-status"></div>
        </section>
      </main>
    </div>

    <div class="bottom-dock">
      <div class="dock-inner">
        <div class="dock-bar">
          <button id="validate-btn">Validate manually</button>
          <span id="status"></span>
          <span class="dock-title">PROBLEMS</span>
        </div>
        <section class="results" id="results" aria-live="polite"></section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
